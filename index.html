
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Origin Hardware Architecture Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Custom scrollbar for better aesthetics */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f8fafc; 
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8; 
      }
      /* Hide scrollbar for clean UI where needed */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      /* Toggle Switch Styles */
      .toggle-checkbox:checked {
        right: 0;
        border-color: #2563EB;
      }
      .toggle-checkbox:checked + .toggle-label {
        background-color: #2563EB;
      }

      /* Print Styles */
      @media print {
        @page {
          size: auto;
          margin: 10mm;
        }
        body {
          background: white;
          overflow: visible !important;
        }
        /* Hide everything by default */
        body > div {
          display: none !important;
        }
        /* Only show root */
        #root, #root > div {
          display: block !important;
          width: 100% !important;
          height: auto !important;
          overflow: visible !important;
        }
        /* Hide sidebar and headers */
        #root > div > div:first-child { /* Sidebar */
           display: none !important;
        }
        #root > div > div:nth-child(2) > div:first-child { /* Top Bar */
           display: none !important;
        }
        
        /* Ensure diagram container is visible and resets transform */
        #root > div > div:nth-child(2) > div:nth-child(2) {
            position: static !important;
            width: 100% !important;
            height: auto !important;
            overflow: visible !important;
        }
      }
    </style>

  }
}
</script>
